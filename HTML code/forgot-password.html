<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Your Account</title>
  <link rel="stylesheet" href="/CSS code/forgot-password.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h2>Find Your Account</h2>
      <p class="subtitle">Please enter your email or username to search for your account.</p>
      
      <div id="step1" class="step">
        <input type="text" id="searchInput" placeholder="Email or Username" autocomplete="off">
        <p id="errorMessage" class="error-message"></p>
        <div class="button-group">
          <button class="btn-secondary" onclick="window.location.href='/HTML code/log-in.html'">Cancel</button>
          <button class="btn-primary" id="searchBtn">Search</button>
        </div>
      </div>

      <div id="step2" class="step" style="display: none;">
        <div class="account-info">
          <img id="accountPic" src="/pictures/Default PFP.png" alt="Profile">
          <div>
            <p class="account-name" id="accountUsername"></p>
            <p class="account-email" id="accountEmail"></p>
          </div>
        </div>
        <p class="subtitle">How do you want to reset your password?</p>
        <div class="reset-option">
          <input type="radio" id="emailOption" name="resetMethod" value="email" checked>
          <label for="emailOption">
            <strong>Send code via email</strong><br>
            <span id="maskedEmail"></span>
          </label>
        </div>
        <p id="step2Error" class="error-message"></p>
        <div class="button-group">
          <button class="btn-secondary" id="backBtn">Back</button>
          <button class="btn-primary" id="continueBtn">Continue</button>
        </div>
      </div>

      <div id="step3" class="step" style="display: none;">
        <p class="subtitle">Enter the 6-digit code sent to your email</p>
        <div class="code-inputs">
          <input type="text" maxlength="1" class="code-input" id="code1">
          <input type="text" maxlength="1" class="code-input" id="code2">
          <input type="text" maxlength="1" class="code-input" id="code3">
          <input type="text" maxlength="1" class="code-input" id="code4">
          <input type="text" maxlength="1" class="code-input" id="code5">
          <input type="text" maxlength="1" class="code-input" id="code6">
        </div>
        <p id="step3Error" class="error-message"></p>
        <p class="resend-text">Didn't receive code? <a href="#" id="resendCode">Resend</a></p>
        <div class="button-group">
          <button class="btn-secondary" onclick="window.location.href='/HTML code/log-in.html'">Cancel</button>
          <button class="btn-primary" id="verifyBtn">Verify</button>
        </div>
      </div>

      <div id="step4" class="step" style="display: none;">
        <p class="subtitle">Choose a new password</p>
        <div class="password-field">
          <input type="password" id="newPassword" placeholder="New Password (min. 6 chars)">
          <button type="button" class="toggle-password" id="toggleNew">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <div class="password-field">
          <input type="password" id="confirmPassword" placeholder="Confirm Password">
          <button type="button" class="toggle-password" id="toggleConfirm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <p id="step4Error" class="error-message"></p>
        <div class="button-group">
          <button class="btn-primary full-width" id="resetBtn">Reset Password</button>
        </div>
      </div>

      <div id="step5" class="step" style="display: none;">
        <div class="success-icon">✓</div>
        <h3>Password Changed Successfully!</h3>
        <p class="subtitle">You can now log in with your new password.</p>
        <button class="btn-primary full-width" onclick="window.location.href='/HTML code/log-in.html'">Go to Login</button>
      </div>
    </div>
  </div>

  <script src="/JS code/forgot-password.js"></script>
</body>
</html>
