<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - AgroKuching</title>
    <link rel="stylesheet" href="/CSS code/profile.css?v=3" />
</head>
<body>

    <header>
        <button class="back-arrow" onclick="window.location.href='/HTML code/home-page.html'" title="Back to Home">
            ← Back
        </button>

        <div class="brand">
            <img src="/pictures/logo.png" alt="Logo" class="brand-logo" />
            <span class="brand-name">AgroKuching</span>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search posts or users..." autocomplete="off" />
            <button class="clear-search-icon" id="clearSearch" style="display: none;">&times;</button>
            <div class="search-dropdown" id="searchDropdown"></div>
        </div>

        <button class="messages-btn" id="messagesBtn" onclick="window.location.href='/HTML code/messages.html'">
            💬 Messages
            <span class="message-badge" id="messageBadge" style="display: none;">0</span>
        </button>

        <div class="profile-menu">
            <button class="profile-btn" id="profileBtn">👤</button> 
            <div class="dropdown" id="profileDropdown">
                <a href="#" id="profileLink">Profile</a>
                <a href="/HTML code/settings.html" id="settingsLink">Settings</a>
                <a href="/HTML code/admin-facebook.html" id="adminLink" style="display: none;">Admin Panel</a>
                <a href="#" id="logoutLink">Log out</a>
            </div>
        </div>
    </header>

    <main>
        <div class="profile-container">
            <div class="profile-header">
                <img id="profilePic" src="/pictures/Default PFP.png" alt="Profile" class="profile-pic-large">
                <div class="profile-info">
                    <h1 id="profileUsername">Username</h1>
                    <p id="profileDescription">Description</p>
                    <div class="profile-stats">
                        <div class="stat">
                            <span class="stat-number" id="postCount">0</span>
                            <span class="stat-label">Posts</span>
                        </div>
                        <div class="stat">
                            <span class="stat-number" id="followerCount">0</span>
                            <span class="stat-label">Followers</span>
                        </div>
                        <div class="stat">
                            <span class="stat-number" id="followingCount">0</span>
                            <span class="stat-label">Following</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button id="followBtn" class="follow-btn" style="display: none;">Follow</button>
                        <button id="dmBtn" class="dm-btn" style="display: none;">💬 Message</button>
                        <button id="editProfileBtn" class="edit-profile-btn" style="display: none;">Edit Profile</button>
                    </div>
                    <div class="profile-details">
                        <p id="profileEmail"></p>
                        <p id="profilePhone"></p>
                        <p id="profileJoined"></p>
                    </div>
                </div>
            </div>

            <div class="profile-posts">
                <h2>Posts</h2>
                <div id="postsContainer"></div>
            </div>
        </div>
    </main>

    <div class="modal" id="logoutModal">
        <div class="modal-content">
            <p>Are you sure you want to log out?</p>
            <button id="confirmLogout" class="submit-btn-red">Yes</button>
            <button id="cancelLogout" class="submit-btn">No</button>
        </div>
    </div>

    <div class="modal" id="imageGallery">
        <div class="gallery-content">
            <span class="close" id="closeGallery">&times;</span>
            <button class="gallery-nav prev" id="galleryPrev">&#10094;</button>
            <img id="galleryImage" />
            <button class="gallery-nav next" id="galleryNext">&#10095;</button>
            <div class="gallery-counter" id="galleryCounter">1 / 1</div>
        </div>
    </div>

    <div class="modal" id="followersModal">
        <div class="followers-modal-content">
            <div class="followers-modal-header">
                <h2 id="followersModalTitle">Followers</h2>
                <span class="close" id="closeFollowersModal">&times;</span>
            </div>
            <div class="followers-tabs">
                <button class="followers-tab active" data-tab="followers">Followers</button>
                <button class="followers-tab" data-tab="following">Following</button>
            </div>
            <div class="followers-list" id="followersList"></div>
        </div>
    </div>

    <script src="/JS code/profile.js?v=4"></script>
</body>
</html>
