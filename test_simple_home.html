<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Home Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { background: #f5f5f5; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .post-card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        .btn { padding: 8px 16px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🧪 Simple Home Page Test</h1>
    
    <div class="test-section">
        <h2>API Test</h2>
        <button class="btn" onclick="testAPI()">Test Posts API</button>
        <div id="apiResult"></div>
    </div>
    
    <div class="test-section">
        <h2>Posts Display</h2>
        <button class="btn" onclick="loadAndDisplayPosts()">Load Posts</button>
        <div id="postsContainer"></div>
    </div>
    
    <div class="test-section">
        <h2>Quick Links</h2>
        <button class="btn" onclick="window.location.href='/HTML code/home-page.html'">Go to Real Home Page</button>
        <button class="btn" onclick="window.location.href='/HTML code/admin-facebook.html'">Go to Admin Panel</button>
    </div>

    <script>
        async function testAPI() {
            const result = document.getElementById('apiResult');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('/api/posts');
                if (response.ok) {
                    const posts = await response.json();
                    result.innerHTML = `<span class="success">✅ API works! Found ${posts.length} posts</span>`;
                    console.log('Posts:', posts);
                } else {
                    result.innerHTML = `<span class="error">❌ API failed: ${response.status}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }
        
        async function loadAndDisplayPosts() {
            const container = document.getElementById('postsContainer');
            container.innerHTML = 'Loading posts...';
            
            try {
                const response = await fetch('/api/posts');
                if (response.ok) {
                    const posts = await response.json();
                    
                    if (posts.length === 0) {
                        container.innerHTML = '<p>No posts found</p>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    posts.forEach(post => {
                        const postDiv = document.createElement('div');
                        postDiv.className = 'post-card';
                        postDiv.innerHTML = `
                            <h3>${post.title}</h3>
                            <p><strong>Author:</strong> ${post.author_username}</p>
                            <p><strong>Price:</strong> ${post.price || 'N/A'}</p>
                            <p><strong>Description:</strong> ${post.description}</p>
                            <p><strong>Contact:</strong> ${post.contact}</p>
                            <p><strong>Posted:</strong> ${new Date(post.post_date).toLocaleString()}</p>
                            <p><strong>Images:</strong> ${post.images ? post.images.length : 0} images</p>
                        `;
                        container.appendChild(postDiv);
                    });
                } else {
                    container.innerHTML = `<span class="error">Failed to load posts: ${response.status}</span>`;
                }
            } catch (error) {
                container.innerHTML = `<span class="error">Error: ${error.message}</span>`;
            }
        }
        
        // Auto-test on page load
        window.onload = function() {
            testAPI();
        };
    </script>
</body>
</html>
