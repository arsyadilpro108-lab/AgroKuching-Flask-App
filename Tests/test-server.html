<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Test - AgroKuching</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .status {
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 18px;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }
        .test-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }
        .test-item.pass {
            border-left-color: #28a745;
        }
        .test-item.fail {
            border-left-color: #dc3545;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>🧪 Server Test Page</h1>
    
    <div class="status success">
        ✅ If you can see this page, the server is working!
    </div>

    <h2>File Structure Tests:</h2>
    <div id="tests"></div>

    <h2>Quick Links:</h2>
    <button onclick="window.location.href='/'">Home</button>
    <button onclick="window.location.href='/HTML code/log-in.html'">Login</button>
    <button onclick="window.location.href='/HTML code/messages.html'">Messages</button>
    <button onclick="window.location.href='/HTML code/file-structure-guide.html'">File Structure</button>

    <script>
        const tests = [
            { name: 'HTML Page Loaded', test: () => true },
            { name: 'JavaScript Loaded', test: () => typeof document !== 'undefined' },
            { name: 'Can Access CSS', test: () => {
                const link = document.createElement('link');
                link.href = '/CSS code/messages.css';
                return true;
            }},
            { name: 'Can Access Images', test: () => {
                const img = new Image();
                img.src = '/pictures/Default PFP.png';
                return true;
            }},
            { name: 'Can Access JS Files', test: () => {
                const script = document.createElement('script');
                script.src = '/JS code/messages.js';
                return true;
            }}
        ];

        const testsDiv = document.getElementById('tests');
        
        tests.forEach(test => {
            const div = document.createElement('div');
            div.className = 'test-item';
            
            try {
                const result = test.test();
                div.className += result ? ' pass' : ' fail';
                div.innerHTML = `${result ? '✅' : '❌'} ${test.name}`;
            } catch (e) {
                div.className += ' fail';
                div.innerHTML = `❌ ${test.name}: ${e.message}`;
            }
            
            testsDiv.appendChild(div);
        });

        // Test API
        fetch('/api/profile')
            .then(r => {
                const div = document.createElement('div');
                div.className = 'test-item ' + (r.status === 401 ? 'pass' : 'fail');
                div.innerHTML = `${r.status === 401 ? '✅' : '❌'} API Endpoint Working (Expected 401 Unauthorized)`;
                testsDiv.appendChild(div);
            })
            .catch(e => {
                const div = document.createElement('div');
                div.className = 'test-item fail';
                div.innerHTML = `❌ API Test Failed: ${e.message}`;
                testsDiv.appendChild(div);
            });
    </script>
</body>
</html>
